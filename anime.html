<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Station - Subnime Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Variabel Warna Tema - Ultra Luxury Blue */
        :root {
            --bg-main: #05070a;
            --bg-gradient: linear-gradient(135deg, #05070a 0%, #0a0f1a 100%);
            --card: rgba(255, 255, 255, 0.03);
            --card-hover: rgba(255, 255, 255, 0.07);
            --text-main: #ffffff;
            --muted: #94a3b8;
            --accent: #00d2ff; 
            --pink: #007bff; /* Primary Blue */
            --lux-grad: linear-gradient(90deg, #007bff, #00d2ff);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-main);
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 100px; 
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 10px; }

        .page-container { 
            max-width: 1200px;
            margin: 0 auto;
            padding: 25px 20px; 
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header & Badges */
        .lux-header-card { 
            margin-bottom: 30px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .role-badge {
            background: var(--lux-grad);
            padding: 6px 18px;
            border-radius: 50px;
            font-weight: 700;
            font-family: 'Rajdhani';
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
        }

        /* Search Bar Luxury */
        .search { position: relative; margin-bottom: 35px; }
        .search input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 15px;
            color: white;
            font-family: 'Poppins';
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .search input:focus {
            border-color: var(--pink);
            background: var(--card-hover);
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.2);
        }
        .search::before {
            content: '\f002';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }

        /* Kategori Chips */
        .lux-section-title {
            font-family: 'Rajdhani';
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 15px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .lux-section-title::after {
            content: '';
            height: 2px;
            flex-grow: 1;
            background: linear-gradient(90deg, var(--pink), transparent);
        }

        .chips {
            display: flex;
            gap: 12px;
            margin-bottom: 35px;
            overflow-x: auto;
